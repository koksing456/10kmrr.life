name: Public repo check

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify public alpha repo
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: brew install ripgrep

      - name: Run public alpha readiness check
        run: ./script/check.sh
