name: Public repo check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify public alpha repo
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: brew install ripgrep

      - name: Verify public repo
        run: ./script/verify_public_repo.sh
